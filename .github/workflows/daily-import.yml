name: Daily Scanner

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC. We trigger at both 04:00 and 05:00 UTC,
    # then keep only the run that is 06:00 in Europe/Madrid.
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CRON_ENDPOINT_URL: ${{ vars.CRON_ENDPOINT_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Check Madrid runtime window
        id: schedule_gate
        if: github.event_name == 'schedule'
        run: |
          if [ "$(TZ=Europe/Madrid date +%H)" != "06" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Not 06:00 in Europe/Madrid. Skipping."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate endpoint configuration
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: |
          test -n "$CRON_ENDPOINT_URL"
          test -n "$CRON_SECRET"

      - name: Trigger production cron endpoint
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: |
          echo "Calling endpoint: $CRON_ENDPOINT_URL"
          response_body="$(mktemp)"
          response_headers="$(mktemp)"
          http_status="$(
            curl --show-error --silent --location \
              -o "$response_body" \
              -D "$response_headers" \
              -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$CRON_ENDPOINT_URL"
          )"

          echo "HTTP status: $http_status"
          echo "Response headers:"
          cat "$response_headers"
          echo "Response body:"
          cat "$response_body"

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "Cron endpoint call failed."
            exit 1
          fi
